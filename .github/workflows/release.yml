name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          VER="${{ github.ref_name }}"
          ZIP="rimworld-hyperdrive-${VER}.zip"
          zip -r "$ZIP" \
            patch.ps1 \
            README.md \
            LICENSE \
            Directory.Build.props \
            src/
          sha256sum "$ZIP" > checksums.sha256
          echo "ZIP_NAME=$ZIP" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RimWorld Hyperdrive ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ${{ env.ZIP_NAME }}
            checksums.sha256

