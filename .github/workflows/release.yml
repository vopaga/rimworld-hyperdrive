name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build Helpers (net472)
        run: dotnet build src/Helpers/Helpers.csproj -c Release -v quiet
        env:
          RimWorldDir: ""   # HintPaths not needed on CI — Cecil is the only real dep

      - name: Publish PatcherTool (self-contained, win-x64, single file)
        run: >
          dotnet publish src/PatcherTool/PatcherTool.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -o publish

      - name: Assemble release folder
        shell: pwsh
        run: |
          $ver    = "${{ github.ref_name }}"
          $folder = "rimworld-hyperdrive-$ver"
          New-Item -ItemType Directory $folder | Out-Null

          Copy-Item patch.ps1                                              $folder/
          Copy-Item README.md                                              $folder/
          Copy-Item publish/RimWorldPatcher.exe                            $folder/PatcherTool.exe
          Copy-Item src/Helpers/bin/Release/net472/RimWorldStartupHelpers.dll $folder/

          echo "RELEASE_DIR=$folder" >> $env:GITHUB_ENV

      - name: Create ZIP + checksum
        shell: pwsh
        run: |
          $ver     = "${{ github.ref_name }}"
          $zip     = "rimworld-hyperdrive-$ver-win-x64.zip"
          Compress-Archive -Path "$env:RELEASE_DIR/*" -DestinationPath $zip
          $hash    = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -Encoding ascii checksums.sha256
          Write-Host "SHA256: $hash"
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RimWorld Hyperdrive ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ${{ env.ZIP_NAME }}
            checksums.sha256
